name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: pip install hatch && hatch build

      - name: Version guard
        run: |
          for f in dist/*; do
            if echo "$f" | grep -qE '0\.0\.0|\.dev'; then
              echo "::error::Bad version in $f - check tag format (needs v prefix) and fetch-depth"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # v1.13.0
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          print-hash: true

  changelog:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: pip install git-cliff

      - name: Generate changelog
        run: git-cliff -o CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "docs: update CHANGELOG.md [skip ci]"
          # Non-fast-forward risk: if main advances in the ~30s between tag push and here,
          # this push fails. Acceptable for a solo project - re-run the job manually if needed.
          git push origin HEAD:main
