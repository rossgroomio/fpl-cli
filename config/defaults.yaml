# Project defaults — committed, no personal data.
# User overrides: settings.yaml in your config directory (see FPL_CLI_CONFIG_DIR)

use_net_points: false  # Include transfer hits in gameweek points rankings (classic only; affects league, review, fines)
custom_analysis: false  # Enable custom scoring algorithms (captain, targets, value scores, Bayesian FDR, etc.)

data_sources:
  cache_ttl: 3600
  rate_limit: 30

thresholds:
  transfer_xg_threshold: 0.15
  price_alert_threshold: 1
  differential_threshold: 5.0
  semi_differential_threshold: 15.0
  captain_differential_threshold: 10.0

llm:
  research:
    provider: perplexity
    model: sonar-pro
    timeout: 120
    query_defaults:
      search_recency_filter: week
  synthesis:
    provider: anthropic
    model: claude-sonnet-4-20250514
    timeout: 60
    query_defaults:
      max_tokens: 1024

# Fines: opt-in via settings.yaml or `fpl init`. Example config:
#
# fines:
#   escalation_note: "Fines double each GW if not honoured"
#   classic:
#     - type: last-place           # Fine if you finish last in the GW
#       penalty: "Pint on video"   # Custom consequence text
#     - type: below-threshold      # Fine if you score below a points threshold
#       threshold: 25
#       penalty: "Pint on video"
#     - type: red-card             # Fine if a starter gets a red card
#       penalty: "Pint on video"
#   draft:
#     - type: last-place
#     - type: below-threshold      # Fine if you score below a points threshold
#       threshold: 25              # Required for below-threshold
#       penalty: "Pint on video"
#
# Valid rule types: last-place, red-card, below-threshold
# Net points (transfer hits) controlled by top-level use_net_points setting
